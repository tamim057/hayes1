<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Hayes Kamla System PRO</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial;
    background:#0b1120;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
    position:relative;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top,#1e3a8a22,transparent 70%),
    linear-gradient(to bottom,#020617,#0f172a,#111827);
    z-index:-5;
}

.rain{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    pointer-events:none;
    overflow:hidden;
    z-index:-1;
}

.drop{
    position:absolute;
    bottom:100%;
    width:2px;
    height:120px;
    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0),
        rgba(255,255,255,0.8)
    );
    opacity:0.5;
    animation:fall linear infinite;
}

@keyframes fall{

    0%{
        transform:translateY(-120px) translateX(0);
        opacity:0;
    }

    10%{
        opacity:0.7;
    }

    100%{
        transform:translateY(120vh) translateX(-40px);
        opacity:0;
    }
}

.flash{
    position:fixed;
    inset:0;
    background:white;
    opacity:0;
    pointer-events:none;
    z-index:-2;
    animation:lightning 7s linear infinite;
}

@keyframes lightning{

    0%{opacity:0;}
    1%{opacity:0.9;}
    1.5%{opacity:0;}
    2%{opacity:0.6;}
    2.2%{opacity:0;}

    14%{opacity:0;}
    14.3%{opacity:0.8;}
    14.5%{opacity:0;}

    50%{opacity:0;}
    50.2%{opacity:1;}
    50.4%{opacity:0;}
    50.6%{opacity:0.7;}
    50.8%{opacity:0;}

    100%{opacity:0;}
}

.container{
    width:420px;
    background:rgba(17,24,39,0.75);
    border:1px solid rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    box-shadow:
    0 0 40px rgba(0,0,0,0.7),
    inset 0 0 20px rgba(255,255,255,0.03);
    backdrop-filter:blur(10px);
    z-index:10;
}

h1{
    text-align:center;
    color:#60a5fa;
    margin-bottom:15px;
    text-shadow:0 0 10px rgba(96,165,250,0.6);
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
    transition:0.25s;
}

button:hover{
    transform:translateY(-2px);
}

.login{
    background:#2563eb;
    color:white;
}

.panel{
    display:none;
    margin-top:20px;
}

.actions{
    display:flex;
    gap:10px;
}

.actions button{
    flex:1;
}

.on{
    background:#22c55e;
    color:white;
}

.off{
    background:#ef4444;
    color:white;
}

.status{
    margin-top:15px;
    background:#0f172acc;
    padding:15px;
    border-radius:12px;
    text-align:center;
    border:1px solid rgba(255,255,255,0.05);
}

#state{
    font-size:18px;
    font-weight:bold;
}

#timer{
    font-size:32px;
    margin-top:10px;
    font-weight:bold;
    letter-spacing:2px;
}

.bellBtn{
    width:100%;
    margin-top:12px;
    padding:12px;
    border-radius:10px;
    background:linear-gradient(45deg,#f59e0b,#f97316);
    color:black;
    font-weight:bold;
    animation:none;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.06);}
    100%{transform:scale(1);}
}

.info{
    margin-top:15px;
    background:#1e293bcc;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    line-height:1.7;
}

</style>
</head>

<body>

<div class="rain" id="rain"></div>

<div class="flash"></div>

<div class="container">

<h1>🔥 Duty System PRO</h1>

<input id="user" placeholder="Discord User ID">

<button class="login" onclick="login()">LOGIN</button>

<div class="panel" id="panel">

<div class="actions">
<button class="on" onclick="onDuty()">ON DUTY</button>
<button class="off" onclick="offDuty()">OFF DUTY</button>
</div>

<button id="bell" class="bellBtn" onclick="extendDuty()">🔔 Extend Duty</button>

<div class="status">
<div id="state">OFF DUTY 🔴</div>
<div id="timer">00:00:00</div>
</div>

<div class="info">
<b> To stay active follow this </b><br><br>
25 Minutes = Bell Required<br>
10 Seconds = Auto OFF DUTY<br><br>

Today Total resets every day at 12:00 AM Bangladesh Time.
</div>

</div>

</div>

<script>

const WEBHOOK_URL = "https://discord.com/api/webhooks/1501942054970982491/0VtmHaOLJdeGjUMVFpvtJ3Wg_MeOnoFqBNzrWFwNWifdS90vvE9XI5COMoPD0ZYmtXNd";

// TEST MODE
const BELL_TIME = 1500;
const GRACE_TIME = 10;

let currentUser = null;
let timer = null;
let beepInterval = null;

// AUTO LOAD

window.onload = () => {

    const savedUser = localStorage.getItem("discordUser");

    if(savedUser){

        document.getElementById("user").value = savedUser;

        currentUser = savedUser;

        document.getElementById("panel").style.display = "block";

        let users = getUsers();

        if(users[currentUser] && users[currentUser].duty){
            startTimer();
        }
    }
};

// USERS

function getUsers(){

    let users = JSON.parse(
        localStorage.getItem("users") || "{}"
    );

    // BANGLADESH TIME
    const bdDate = new Date(
        new Date().toLocaleString("en-US", {
            timeZone:"Asia/Dhaka"
        })
    );

    const today =
    bdDate.getFullYear() + "-" +
    (bdDate.getMonth()+1) + "-" +
    bdDate.getDate();

    for(let id in users){

        if(!users[id].lastReset){

            users[id].lastReset = today;
        }

        // DAILY RESET
        if(users[id].lastReset !== today){

            users[id].total = 0;

            users[id].lastReset = today;
        }
    }

    localStorage.setItem(
        "users",
        JSON.stringify(users)
    );

    return users;
}

function saveUsers(data){
    localStorage.setItem("users", JSON.stringify(data));
}

// LOGIN

function login(){

    const user = document.getElementById("user").value.trim();

    if(!user){
        alert("Enter Discord User ID");
        return;
    }

    currentUser = user;

    localStorage.setItem("discordUser", user);

    document.getElementById("panel").style.display = "block";

    let users = getUsers();

    if(!users[user]){

        users[user] = {
            duty:false,
            start:null,
            bellRequired:false,
            bellStart:null,
            total:0,
            lastCycle:0,
            lastReset:""
        };

        saveUsers(users);
    }
}

// ON DUTY

function onDuty(){

    let users = getUsers();

    let u = users[currentUser];

    u.duty = true;

    u.start = Date.now();

    u.bellRequired = false;

    u.bellStart = null;

    u.lastCycle = 0;

    saveUsers(users);

    sendWebhook("🟢 ON DUTY STARTED",0);

    startTimer();
}

// OFF DUTY

function offDuty(auto = false){

    let users = getUsers();

    let u = users[currentUser];

    let session = 0;

    if(u.start){

        session = Math.floor(
            (Date.now() - u.start)/1000
        );

        u.total += session;
    }

    u.duty = false;

    u.start = null;

    u.bellRequired = false;

    u.bellStart = null;

    u.lastCycle = 0;

    saveUsers(users);

    clearInterval(timer);

    document.getElementById("state").innerText =
    "OFF DUTY 🔴";

    document.getElementById("timer").innerText =
    "00:00:00";

    document.getElementById("bell").style.animation =
    "none";
    stopBeep();

    let action = auto
    ? "⛔ AUTO OFF DUTY"
    : "🔴 OFF DUTY";

    sendWebhook(action, session);
}

// BELL CLICK

function extendDuty(){

    let users = getUsers();

    let u = users[currentUser];

    if(!u.duty) return;

    if(!u.bellRequired){

        alert("Bell is not required yet.");

        return;
    }

    // CONTINUE DUTY WITHOUT RESETTING TIMER

    u.bellRequired = false;

    u.bellStart = null;

    saveUsers(users);

    document.getElementById("bell").style.animation =
    "none";
    stopBeep();

    document.getElementById("state").innerText =
    "ON DUTY 🟢";

    alert("Duty Continued Successfully 🔔");
}

// TIMER
function beep(){
    let ctx = new (window.AudioContext || window.webkitAudioContext)();
    let osc = ctx.createOscillator();
    let gain = ctx.createGain();

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.type = "sine";
    osc.frequency.value = 900;

    osc.start();
    osc.stop(ctx.currentTime + 0.1);
}

function startBeep(){
    stopBeep();
    beepInterval = setInterval(beep, 1000);
}

function stopBeep(){
    if(beepInterval){
        clearInterval(beepInterval);
        beepInterval = null;
    }
}

function startTimer(){

    clearInterval(timer);

    timer = setInterval(()=>{

        let users = getUsers();

        let u = users[currentUser];

        if(!u || !u.start || !u.duty) return;

        let diff = Math.floor(
            (Date.now() - u.start)/1000
        );

        // EVERY 10 SECONDS
        if(diff >= BELL_TIME){

            let cycles = Math.floor(diff / BELL_TIME);

            let lastCycle = u.lastCycle || 0;

            if(cycles > lastCycle){

                u.lastCycle = cycles;

                u.bellRequired = true;

                u.bellStart = Date.now();

                saveUsers(users);

                document.getElementById("bell").style.animation =
                "pulse 1s infinite";
                startBeep();
            }
        }

        // WAITING FOR BELL
        if(u.bellRequired){

            let grace = Math.floor(
                (Date.now() - u.bellStart)/1000
            );

            let remain = GRACE_TIME - grace;

            document.getElementById("state").innerText =
            `⚠️ CLICK BELL (${remain}s)`;

            // AUTO OFF DUTY
            if(grace >= GRACE_TIME){

                offDuty(true);

                return;
            }

        }else{

            document.getElementById("state").innerText =
            "ON DUTY 🟢";
        }

        let h = String(Math.floor(diff/3600)).padStart(2,'0');

        let m = String(Math.floor((diff%3600)/60)).padStart(2,'0');

        let s = String(diff%60).padStart(2,'0');

        document.getElementById("timer").innerText =
        `${h}:${m}:${s}`;

    },1000);
}

// WEBHOOK

function sendWebhook(action,session){

    let users = getUsers();

    let u = users[currentUser];

    let total = u.total || 0;

    let totalH = Math.floor(total/3600);

    let totalM = Math.floor((total%3600)/60);

    const mention = `<@${currentUser}>`;

    fetch(WEBHOOK_URL,{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            content:mention,

            username:"🔥 Duty System",

            embeds:[{

                title:"📊 Duty Report",

                color:u.duty ? 0x00ff00 : 0xff0000,

                fields:[

                    {
                        name:"👤 Member",
                        value:mention,
                        inline:true
                    },

                    {
                        name:"⚡ Action",
                        value:action,
                        inline:true
                    },

                    {
                        name:"⏱ Session",
                        value:
                        Math.floor(session/3600)+"h "+
                        Math.floor((session%3600)/60)+"m "+
                        (session%60)+"s",
                        inline:true
                    },

                    {
                        name:"📅 Today Total",
                        value:`${totalH}h ${totalM}m`,
                        inline:false
                    }

                ],

                footer:{
                    text:"Duty System PRO"
                },

                timestamp:new Date().toISOString()

            }]

        })

    }).catch(err=>console.log(err));
}

// RAIN EFFECT

const rain = document.getElementById("rain");

for(let i=0;i<250;i++){

    let drop = document.createElement("div");

    drop.classList.add("drop");

    drop.style.left = Math.random()*100 + "vw";

    drop.style.animationDuration =
    (0.35 + Math.random()*0.35) + "s";

    drop.style.animationDelay =
    Math.random()*2 + "s";

    drop.style.opacity =
    0.2 + Math.random()*0.5;

    drop.style.height =
    80 + Math.random()*120 + "px";

    rain.appendChild(drop);
}

</script>

</body>
</html>
